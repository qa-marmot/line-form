<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>現場勤怠報告フォーム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-100 p-4">
  <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md mt-4">
    <h1 class="text-xl font-bold mb-4 text-center text-gray-800">現場勤怠報告</h1>
    <p class="mb-4 text-center text-gray-600"><span id="displayName" class="font-bold"></span>さんが報告中</p>

    <div class="mb-4">
      <label class="block text-gray-700 font-bold mb-2">現場名</label>
      <input type="text" id="siteName" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
    </div>

    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-gray-700 font-bold mb-2">出勤時間</label>
        <input type="time" id="startTime" value="08:00" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
      </div>
      <div>
        <label class="block text-gray-700 font-bold mb-2">退勤時間</label>
        <input type="time" id="endTime" value="17:00" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
      </div>
    </div>

    <div class="mb-4">
      <label class="block text-gray-700 font-bold mb-2">休憩時間 (分)</label>
      <input type="number" id="breakTime" value="60" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
    </div>

    <div class="mb-4">
      <label class="block text-gray-700 font-bold mb-2">作業内容</label>
      <textarea id="description" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"></textarea>
    </div>

    <div class="mb-6">
      <label class="block text-gray-700 font-bold mb-2">作業者</label>
      <div id="workersContainer" class="space-y-2 mb-2">
        <input type="text" class="worker-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" placeholder="氏名">
      </div>
      <button type="button" id="addWorkerBtn" class="text-blue-500 font-bold text-sm py-2 px-4 bg-blue-50 rounded border border-blue-500 w-full">+ 作業者を追加</button>
    </div>

    <button id="submitBtn" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg disabled:bg-gray-400 disabled:cursor-not-allowed transition duration-200">送信する</button>
  </div>

  <script>
    const LIFF_ID = '2009631449-wR9B9bvc';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycby3IcAQqMqAblRk36IRZ-T2BMgQcIgfTBR5B7LJNoml6fIeLi70S3ZqIikjw4aI0JgXVQ/exec';

    let managerId = '';
    let managerName = '';

    const displayNameSpan = document.getElementById('displayName');
    const addWorkerBtn = document.getElementById('addWorkerBtn');
    const workersContainer = document.getElementById('workersContainer');
    const submitBtn = document.getElementById('submitBtn');

    async function initLiff() {
      await liff.init({ liffId: LIFF_ID });
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        managerId = profile.userId;
        managerName = profile.displayName;
        displayNameSpan.textContent = managerName;
      } else {
        liff.login();
      }
    }

    addWorkerBtn.addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'worker-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500';
      input.placeholder = '氏名';
      workersContainer.appendChild(input);
    });

    submitBtn.addEventListener('click', async () => {
      const siteName = document.getElementById('siteName').value;
      const startTime = document.getElementById('startTime').value;
      const endTime = document.getElementById('endTime').value;
      const breakTime = document.getElementById('breakTime').value;
      const description = document.getElementById('description').value;
      
      const workerInputs = document.querySelectorAll('.worker-input');
      const workers = Array.from(workerInputs)
                           .map(input => input.value)
                           .filter(val => val.trim() !== '');

      if (!siteName || workers.length === 0) {
        alert('現場名と最低1名の作業者を入力してください。');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '送信中...';

      const payload = {
        managerId: managerId,
        managerName: managerName,
        siteName: siteName,
        startTime: startTime,
        endTime: endTime,
        breakTime: breakTime,
        description: description,
        workers: workers
      };

      try {
        await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify(payload),
          headers: {
            'Content-Type': 'text/plain'
          }
        });
        liff.closeWindow();
      } catch (error) {
        submitBtn.disabled = false;
        submitBtn.textContent = '送信する';
        alert('送信エラーが発生しました');
      }
    });

    initLiff();
  </script>
</body>
</html>
